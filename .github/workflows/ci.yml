name: CI

on:
  push:
    branches:
      - dev
      - main
      - master
  pull_request:
    branches:
      - dev
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore EasyInventory.sln

      - name: Build
        run: dotnet build EasyInventory.sln -c Release --no-restore
