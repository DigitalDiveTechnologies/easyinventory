name: CD

on:
  push:
    branches:
      - dev
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish and zip
        shell: bash
        run: |
          set -euo pipefail
          dotnet restore EasyInventory.sln
          dotnet publish ShopOn.Web/ShopOn.Web.csproj -c Release -o artifacts/publish --no-restore
          cd artifacts && zip -r easyinventory-site.zip publish

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easyinventory-site-package
          path: artifacts/easyinventory-site.zip
          if-no-files-found: error
          retention-days: 14
